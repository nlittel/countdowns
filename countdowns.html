<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Countdowns" />
  <meta name="theme-color" content="#0D1B2A" />
  <title>Countdowns</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0D1B2A;
      --card: rgba(255,255,255,0.06);
      --card-border: rgba(255,255,255,0.10);
      --accent: #F5A623;
      --accent-dark: #d48e10;
      --text: #ffffff;
      --text-muted: rgba(255,255,255,0.4);
      --text-dim: rgba(255,255,255,0.25);
      --modal-bg: #1A2B3C;
      --input-bg: rgba(255,255,255,0.08);
      --input-border: rgba(255,255,255,0.15);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      user-select: none;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px 10px;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.6px;
      color: var(--text);
    }

    .add-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.12s, background 0.12s;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .add-btn:active { transform: scale(0.90); background: var(--accent-dark); }
    .add-btn svg { width: 22px; height: 22px; stroke: #fff; stroke-width: 2.5; fill: none; stroke-linecap: round; }

    .list {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 4px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Cards */
    .card {
      background: var(--card);
      border: 0.5px solid var(--card-border);
      border-radius: 20px;
      padding: 16px 18px;
      transition: opacity 0.3s, transform 0.2s, box-shadow 0.2s;
      position: relative;
      touch-action: none;
    }

    .card.past { opacity: 0.5; }
    .card.dragging {
      opacity: 0.92;
      transform: scale(1.03);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      z-index: 10;
      border-color: var(--accent);
    }
    .card.drag-over {
      border-color: rgba(245,166,35,0.5);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    /* Drag handle */
    .drag-handle {
      display: flex;
      align-items: center;
      padding: 2px 10px 2px 0;
      cursor: grab;
      color: var(--text-dim);
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .drag-handle:active { cursor: grabbing; }
    .drag-handle svg { width: 16px; height: 16px; fill: currentColor; }

    .card-meta { flex: 1; min-width: 0; }

    .card-label {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-date {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .card-actions {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
      margin-left: 8px;
    }

    .card-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      padding: 4px 6px;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.15s;
    }
    .card-btn.edit:active { color: var(--accent); }
    .card-btn.del:active  { color: rgba(255,80,80,0.9); }
    .card-btn svg { width: 17px; height: 17px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

    /* Countdown digits */
    .countdown {
      display: flex;
      gap: 4px;
      align-items: flex-end;
    }

    .cd-block {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .cd-num {
      font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
      font-size: 30px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      letter-spacing: -1px;
    }

    .cd-lbl {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-top: 3px;
    }

    .cd-sep {
      font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
      font-size: 26px;
      color: rgba(245,166,35,0.35);
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1;
    }

    .past-label {
      font-size: 13px;
      color: var(--text-muted);
    }

    .progress-bar {
      height: 2px;
      background: rgba(255,255,255,0.08);
      border-radius: 1px;
      margin-top: 14px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 1px;
      background: var(--accent);
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .empty-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      opacity: 0.3;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex;
      align-items: flex-end;
      z-index: 100;
      padding-bottom: var(--safe-bottom);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .modal-overlay.hidden { display: none; }

    .modal {
      background: var(--modal-bg);
      border-radius: 24px 24px 0 0;
      padding: 24px 20px 28px;
      width: 100%;
      animation: slideUp 0.28s cubic-bezier(0.32,0.72,0,1);
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 18px;
    }

    .field { margin-bottom: 14px; }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 7px;
    }

    .field input {
      width: 100%;
      background: var(--input-bg);
      border: 0.5px solid var(--input-border);
      border-radius: 12px;
      color: var(--text);
      font-size: 16px;
      padding: 13px 14px;
      outline: none;
      font-family: inherit;
      -webkit-appearance: none;
      appearance: none;
      color-scheme: dark;
      user-select: text;
    }

    .field input:focus { border-color: var(--accent); }
    .field input::placeholder { color: var(--text-dim); }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn-cancel {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border: none;
      border-radius: 14px;
      color: rgba(255,255,255,0.6);
      font-size: 16px;
      font-weight: 500;
      padding: 15px;
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-save {
      flex: 1;
      background: var(--accent);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      padding: 15px;
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.12s;
    }

    .btn-save:active { background: var(--accent-dark); }
  </style>
</head>
<body>

  <div class="header">
    <span class="header-title">Countdowns</span>
    <button class="add-btn" onclick="openModal(null)" aria-label="Add event">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>

  <div class="list" id="list"></div>

  <div class="modal-overlay hidden" id="modalOverlay" onclick="overlayClick(event)">
    <div class="modal">
      <div class="modal-title" id="modalTitle">New event</div>
      <div class="field">
        <label for="newLabel">Event name</label>
        <input type="text" id="newLabel" placeholder="e.g. Flight to Tokyo" autocomplete="off" />
      </div>
      <div class="field">
        <label for="newDate">Date &amp; time</label>
        <input type="datetime-local" id="newDate" />
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" id="modalSaveBtn" onclick="saveModal()">Add</button>
      </div>
    </div>
  </div>

  <script>
    const STORE_KEY = 'countdown_events_v1';

    function loadEvents() {
      try {
        const raw = localStorage.getItem(STORE_KEY);
        return raw ? JSON.parse(raw) : defaultEvents();
      } catch(e) { return defaultEvents(); }
    }

    function saveEvents() {
      try { localStorage.setItem(STORE_KEY, JSON.stringify(events)); } catch(e) {}
    }

    function defaultEvents() {
      const ny = new Date(new Date().getFullYear() + 1, 0, 1).getTime();
      const weekend = (() => {
        const d = new Date();
        const diff = (6 - d.getDay() + 7) % 7 || 7;
        d.setDate(d.getDate() + diff);
        d.setHours(9, 0, 0, 0);
        return d.getTime();
      })();
      return [
        { id: 1, label: "New Year's Day", dt: ny, created: new Date(new Date().getFullYear(), 0, 1).getTime() },
        { id: 2, label: "Weekend!", dt: weekend, created: Date.now() },
      ];
    }

    let events = loadEvents();
    let nextId = events.reduce((m, e) => Math.max(m, e.id), 0) + 1;
    let editingId = null;

    function pad(n) { return String(Math.floor(Math.abs(n))).padStart(2, '0'); }

    function diffParts(ms) {
      if (ms <= 0) return null;
      const s = Math.floor(ms / 1000);
      return {
        d: pad(Math.floor(s / 86400)),
        h: pad(Math.floor((s % 86400) / 3600)),
        m: pad(Math.floor((s % 3600) / 60)),
        s: pad(s % 60),
      };
    }

    function fmtDate(ts) {
      return new Date(ts).toLocaleString('en-AU', {
        weekday: 'short', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Drag-to-reorder state
    let dragId = null;
    let dragOverId = null;

    function cardHtml(ev, now) {
      const left = ev.dt - now;
      const parts = diffParts(left);
      const total = ev.dt - ev.created;
      const pct = total > 0 ? Math.max(0, Math.min(100, (left / total) * 100)) : 0;
      const past = !parts;

      return `
        <div class="card${past ? ' past' : ''}" id="card-${ev.id}"
          data-id="${ev.id}"
          draggable="true"
          ondragstart="onDragStart(event,${ev.id})"
          ondragover="onDragOver(event,${ev.id})"
          ondragleave="onDragLeave(event,${ev.id})"
          ondrop="onDrop(event,${ev.id})"
          ondragend="onDragEnd(event)">
          <div class="card-header">
            <div class="drag-handle" title="Drag to reorder"
              ontouchstart="onTouchStart(event,${ev.id})"
              ontouchmove="onTouchMove(event)"
              ontouchend="onTouchEnd(event)">
              <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                <rect x="2" y="3" width="12" height="2" rx="1"/>
                <rect x="2" y="7" width="12" height="2" rx="1"/>
                <rect x="2" y="11" width="12" height="2" rx="1"/>
              </svg>
            </div>
            <div class="card-meta">
              <div class="card-label">${escHtml(ev.label)}</div>
              <div class="card-date">${fmtDate(ev.dt)}</div>
            </div>
            <div class="card-actions">
              <button class="card-btn edit" onclick="openModal(${ev.id})" aria-label="Edit">
                <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="card-btn del" onclick="removeEvent(${ev.id})" aria-label="Delete">
                <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
              </button>
            </div>
          </div>
          ${past
            ? `<div class="past-label">This event has passed</div>`
            : `<div class="countdown">
                <div class="cd-block"><span class="cd-num" id="d-${ev.id}">${parts.d}</span><span class="cd-lbl">days</span></div>
                <span class="cd-sep">:</span>
                <div class="cd-block"><span class="cd-num" id="h-${ev.id}">${parts.h}</span><span class="cd-lbl">hrs</span></div>
                <span class="cd-sep">:</span>
                <div class="cd-block"><span class="cd-num" id="m-${ev.id}">${parts.m}</span><span class="cd-lbl">min</span></div>
                <span class="cd-sep">:</span>
                <div class="cd-block"><span class="cd-num" id="s-${ev.id}">${parts.s}</span><span class="cd-lbl">sec</span></div>
              </div>
              <div class="progress-bar"><div class="progress-fill" id="p-${ev.id}" style="width:${pct.toFixed(2)}%"></div></div>`
          }
        </div>`;
    }

    function render() {
      const list = document.getElementById('list');
      const now = Date.now();

      if (!events.length) {
        list.innerHTML = `
          <div class="empty">
            <svg class="empty-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <rect x="6" y="10" width="36" height="32" rx="6"/>
              <line x1="16" y1="6" x2="16" y2="14"/>
              <line x1="32" y1="6" x2="32" y2="14"/>
              <line x1="6" y1="22" x2="42" y2="22"/>
              <line x1="24" y1="30" x2="24" y2="38"/>
              <line x1="20" y1="34" x2="28" y2="34"/>
            </svg>
            No countdowns yet.<br>Tap + to add your first event.
          </div>`;
        return;
      }

      list.innerHTML = events.map(ev => cardHtml(ev, now)).join('');
    }

    function tick() {
      const now = Date.now();
      let needsFullRender = false;

      events.forEach(ev => {
        const left = ev.dt - now;
        const parts = diffParts(left);

        if (!parts) {
          if (document.getElementById(`s-${ev.id}`)) needsFullRender = true;
          return;
        }

        const sEl = document.getElementById(`s-${ev.id}`);
        if (!sEl) { needsFullRender = true; return; }

        document.getElementById(`d-${ev.id}`).textContent = parts.d;
        document.getElementById(`h-${ev.id}`).textContent = parts.h;
        document.getElementById(`m-${ev.id}`).textContent = parts.m;
        sEl.textContent = parts.s;

        const total = ev.dt - ev.created;
        const pct = total > 0 ? Math.max(0, Math.min(100, (left / total) * 100)) : 0;
        const pEl = document.getElementById(`p-${ev.id}`);
        if (pEl) pEl.style.width = pct.toFixed(2) + '%';
      });

      if (needsFullRender) render();
    }

    // ── Modal ─────────────────────────────────────────────────────────────────

    function openModal(id) {
      editingId = id;
      const isEdit = id !== null;
      document.getElementById('modalTitle').textContent = isEdit ? 'Edit event' : 'New event';
      document.getElementById('modalSaveBtn').textContent = isEdit ? 'Save' : 'Add';

      if (isEdit) {
        const ev = events.find(e => e.id === id);
        document.getElementById('newLabel').value = ev.label;
        const d = new Date(ev.dt);
        d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
        document.getElementById('newDate').value = d.toISOString().slice(0, 16);
      } else {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('newDate').value = now.toISOString().slice(0, 16);
        document.getElementById('newLabel').value = '';
      }

      document.getElementById('modalOverlay').classList.remove('hidden');
      setTimeout(() => document.getElementById('newLabel').focus(), 80);
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.add('hidden');
      editingId = null;
    }

    function overlayClick(e) {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    }

    function saveModal() {
      const label = document.getElementById('newLabel').value.trim();
      const rawDate = document.getElementById('newDate').value;
      if (!label || !rawDate) return;
      const dt = new Date(rawDate).getTime();
      if (isNaN(dt)) return;

      if (editingId !== null) {
        const ev = events.find(e => e.id === editingId);
        if (ev) { ev.label = label; ev.dt = dt; }
      } else {
        events.push({ id: nextId++, label, dt, created: Date.now() });
      }

      saveEvents();
      closeModal();
      render();
    }

    function removeEvent(id) {
      events = events.filter(e => e.id !== id);
      saveEvents();
      render();
    }

    // ── Drag-to-reorder (mouse/desktop) ──────────────────────────────────────

    function onDragStart(e, id) {
      dragId = id;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => {
        const el = document.getElementById('card-' + id);
        if (el) el.classList.add('dragging');
      }, 0);
    }

    function onDragOver(e, id) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (id === dragId) return;
      if (dragOverId !== id) {
        if (dragOverId) {
          const prev = document.getElementById('card-' + dragOverId);
          if (prev) prev.classList.remove('drag-over');
        }
        dragOverId = id;
        const el = document.getElementById('card-' + id);
        if (el) el.classList.add('drag-over');
      }
    }

    function onDragLeave(e, id) {
      const el = document.getElementById('card-' + id);
      if (el) el.classList.remove('drag-over');
      if (dragOverId === id) dragOverId = null;
    }

    function onDrop(e, id) {
      e.preventDefault();
      if (dragId === null || dragId === id) return;
      reorder(dragId, id);
    }

    function onDragEnd(e) {
      const el = document.getElementById('card-' + dragId);
      if (el) el.classList.remove('dragging');
      if (dragOverId) {
        const ov = document.getElementById('card-' + dragOverId);
        if (ov) ov.classList.remove('drag-over');
      }
      dragId = null;
      dragOverId = null;
    }

    function reorder(fromId, toId) {
      const fromIdx = events.findIndex(e => e.id === fromId);
      const toIdx   = events.findIndex(e => e.id === toId);
      if (fromIdx === -1 || toIdx === -1) return;
      const [moved] = events.splice(fromIdx, 1);
      events.splice(toIdx, 0, moved);
      saveEvents();
      render();
    }

    // ── Touch drag-to-reorder (mobile) ───────────────────────────────────────

    let touchDragId = null;
    let touchClone = null;
    let touchOffsetY = 0;
    let touchLastOverId = null;

    function onTouchStart(e, id) {
      // Only start drag from the handle
      touchDragId = id;
      const card = document.getElementById('card-' + id);
      const rect = card.getBoundingClientRect();
      touchOffsetY = e.touches[0].clientY - rect.top;

      // Clone card for visual drag ghost
      touchClone = card.cloneNode(true);
      touchClone.style.cssText = `
        position: fixed;
        left: ${rect.left}px;
        top: ${rect.top}px;
        width: ${rect.width}px;
        z-index: 999;
        pointer-events: none;
        opacity: 0.9;
        transform: scale(1.03);
        border: 0.5px solid var(--accent);
        border-radius: 20px;
        background: rgba(26,43,60,0.95);
        transition: none;
      `;
      document.body.appendChild(touchClone);
      card.style.opacity = '0.3';
      e.preventDefault();
    }

    function onTouchMove(e) {
      if (touchDragId === null || !touchClone) return;
      e.preventDefault();
      const touch = e.touches[0];
      const y = touch.clientY - touchOffsetY;
      touchClone.style.top = y + 'px';

      // Find which card we're over
      const list = document.getElementById('list');
      const cards = list.querySelectorAll('.card[data-id]');
      let overId = null;
      cards.forEach(c => {
        const cid = parseInt(c.dataset.id);
        if (cid === touchDragId) return;
        const r = c.getBoundingClientRect();
        if (touch.clientY >= r.top && touch.clientY <= r.bottom) overId = cid;
        c.classList.remove('drag-over');
      });
      if (overId !== null) {
        const overEl = document.getElementById('card-' + overId);
        if (overEl) overEl.classList.add('drag-over');
      }
      touchLastOverId = overId;
    }

    function onTouchEnd(e) {
      if (touchDragId === null) return;
      if (touchClone) { touchClone.remove(); touchClone = null; }
      const card = document.getElementById('card-' + touchDragId);
      if (card) card.style.opacity = '';
      const list = document.getElementById('list');
      list.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over'));

      if (touchLastOverId !== null && touchLastOverId !== touchDragId) {
        reorder(touchDragId, touchLastOverId);
      }

      touchDragId = null;
      touchLastOverId = null;
    }

    render();
    setInterval(tick, 1000);
  </script>
</body>
