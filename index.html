<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Countdowns" />
  <meta name="theme-color" content="#0D1B2A" />
  <title>Countdowns</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0D1B2A;
      --card: rgba(255,255,255,0.06);
      --card-border: rgba(255,255,255,0.10);
      --accent: #F5A623;
      --accent-dark: #d48e10;
      --text: #ffffff;
      --text-muted: rgba(255,255,255,0.4);
      --text-dim: rgba(255,255,255,0.25);
      --modal-bg: #1A2B3C;
      --input-bg: rgba(255,255,255,0.08);
      --input-border: rgba(255,255,255,0.15);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      user-select: none;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px 10px;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.6px;
      color: var(--text);
    }

    .add-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.12s, background 0.12s;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .add-btn:active { transform: scale(0.90); background: var(--accent-dark); }
    .add-btn svg { width: 22px; height: 22px; stroke: #fff; stroke-width: 2.5; fill: none; stroke-linecap: round; }

    .list {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 4px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: var(--card);
      border: 0.5px solid var(--card-border);
      border-radius: 20px;
      padding: 16px 18px;
      position: relative;
      transition: border-color 0.15s, opacity 0.15s;
    }

    .card.past { opacity: 0.5; }
    .card.drag-placeholder {
      opacity: 0.3;
      border: 1.5px dashed var(--accent);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      margin-bottom: 12px;
      gap: 0;
    }

    .drag-handle {
      display: flex;
      align-items: center;
      padding: 2px 12px 2px 0;
      cursor: grab;
      color: var(--text-dim);
      flex-shrink: 0;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }
    .drag-handle svg { width: 16px; height: 16px; fill: currentColor; }

    .card-meta { flex: 1; min-width: 0; }

    .card-label {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-date {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .card-actions {
      display: flex;
      align-items: center;
      flex-shrink: 0;
      margin-left: 8px;
    }

    .card-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      padding: 4px 5px;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.15s;
    }
    .card-btn.edit:active { color: var(--accent); }
    .card-btn.del:active  { color: rgba(255,80,80,0.9); }
    .card-btn svg { width: 17px; height: 17px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

    .countdown {
      display: flex;
      gap: 4px;
      align-items: flex-end;
    }

    .cd-block {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .cd-num {
      font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
      font-size: 30px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      letter-spacing: -1px;
    }

    .cd-lbl {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-top: 3px;
    }

    .cd-sep {
      font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
      font-size: 26px;
      color: rgba(245,166,35,0.35);
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1;
    }

    .past-label { font-size: 13px; color: var(--text-muted); }

    .progress-bar {
      height: 2px;
      background: rgba(255,255,255,0.08);
      border-radius: 1px;
      margin-top: 14px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 1px;
      background: var(--accent);
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.7;
    }
    .empty-icon { width: 48px; height: 48px; margin: 0 auto 16px; opacity: 0.3; }

    /* Floating drag ghost */
    #dragGhost {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      border-radius: 20px;
      background: #1e3347;
      border: 1.5px solid var(--accent);
      padding: 16px 18px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
      opacity: 0.95;
      display: none;
    }
    #dragGhost .ghost-label { font-size: 16px; font-weight: 600; color: var(--text); }
    #dragGhost .ghost-date  { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex;
      align-items: flex-end;
      z-index: 100;
      padding-bottom: var(--safe-bottom);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .modal-overlay.hidden { display: none; }

    .modal {
      background: var(--modal-bg);
      border-radius: 24px 24px 0 0;
      padding: 24px 20px 28px;
      width: 100%;
      animation: slideUp 0.28s cubic-bezier(0.32,0.72,0,1);
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .modal-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 18px; }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 7px;
    }
    .field input {
      width: 100%;
      background: var(--input-bg);
      border: 0.5px solid var(--input-border);
      border-radius: 12px;
      color: var(--text);
      font-size: 16px;
      padding: 13px 14px;
      outline: none;
      font-family: inherit;
      -webkit-appearance: none;
      appearance: none;
      color-scheme: dark;
      user-select: text;
    }
    .field input:focus { border-color: var(--accent); }
    .field input::placeholder { color: var(--text-dim); }

    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }

    .btn-cancel {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border: none;
      border-radius: 14px;
      color: rgba(255,255,255,0.6);
      font-size: 16px;
      font-weight: 500;
      padding: 15px;
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-save {
      flex: 1;
      background: var(--accent);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      padding: 15px;
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.12s;
    }
    .btn-save:active { background: var(--accent-dark); }
  </style>
</head>
<body>

  <div class="header">
    <span class="header-title">Countdowns</span>
    <button class="add-btn" onclick="openModal(null)" aria-label="Add event">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>

  <div class="list" id="list"></div>

  <!-- Floating ghost for touch drag -->
  <div id="dragGhost">
    <div class="ghost-label" id="ghostLabel"></div>
    <div class="ghost-date"  id="ghostDate"></div>
  </div>

  <div class="modal-overlay hidden" id="modalOverlay" onclick="overlayClick(event)">
    <div class="modal">
      <div class="modal-title" id="modalTitle">New event</div>
      <div class="field">
        <label for="newLabel">Event name</label>
        <input type="text" id="newLabel" placeholder="e.g. Flight to Tokyo" autocomplete="off" />
      </div>
      <div class="field">
        <label for="newDate">Date &amp; time</label>
        <input type="datetime-local" id="newDate" />
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" id="modalSaveBtn" onclick="saveModal()">Add</button>
      </div>
    </div>
  </div>

  <script>
    const STORE_KEY = 'countdown_events_v1';

    function loadEvents() {
      try {
        const raw = localStorage.getItem(STORE_KEY);
        return raw ? JSON.parse(raw) : defaultEvents();
      } catch(e) { return defaultEvents(); }
    }

    function saveEvents() {
      try { localStorage.setItem(STORE_KEY, JSON.stringify(events)); } catch(e) {}
    }

    function defaultEvents() {
      const ny = new Date(new Date().getFullYear() + 1, 0, 1).getTime();
      const weekend = (() => {
        const d = new Date();
        const diff = (6 - d.getDay() + 7) % 7 || 7;
        d.setDate(d.getDate() + diff);
        d.setHours(9, 0, 0, 0);
        return d.getTime();
      })();
      return [
        { id: 1, label: "New Year's Day", dt: ny, created: new Date(new Date().getFullYear(), 0, 1).getTime() },
        { id: 2, label: "Weekend!", dt: weekend, created: Date.now() },
      ];
    }

    let events = loadEvents();
    let nextId = events.reduce((m, e) => Math.max(m, e.id), 0) + 1;
    let editingId = null;

    function pad(n) { return String(Math.floor(Math.abs(n))).padStart(2,'0'); }

    function diffParts(ms) {
      if (ms <= 0) return null;
      const s = Math.floor(ms / 1000);
      return {
        d: pad(Math.floor(s / 86400)),
        h: pad(Math.floor((s % 86400) / 3600)),
        m: pad(Math.floor((s % 3600) / 60)),
        s: pad(s % 60),
      };
    }

    function fmtDate(ts) {
      return new Date(ts).toLocaleString('en-AU', {
        weekday:'short', month:'short', day:'numeric',
        hour:'2-digit', minute:'2-digit'
      });
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Render ────────────────────────────────────────────────────────────────

    function cardHtml(ev, now) {
      const left = ev.dt - now;
      const parts = diffParts(left);
      const total = ev.dt - ev.created;
      const pct = total > 0 ? Math.max(0, Math.min(100, (left / total) * 100)) : 0;
      const past = !parts;

      return `<div class="card${past?' past':''}" id="card-${ev.id}" data-id="${ev.id}">
        <div class="card-header">
          <div class="drag-handle" data-drag="${ev.id}" aria-label="Drag to reorder">
            <svg viewBox="0 0 16 16"><rect x="2" y="3" width="12" height="2" rx="1"/><rect x="2" y="7" width="12" height="2" rx="1"/><rect x="2" y="11" width="12" height="2" rx="1"/></svg>
          </div>
          <div class="card-meta">
            <div class="card-label">${escHtml(ev.label)}</div>
            <div class="card-date">${fmtDate(ev.dt)}</div>
          </div>
          <div class="card-actions">
            <button class="card-btn edit" data-edit="${ev.id}" aria-label="Edit">
              <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="card-btn del" data-del="${ev.id}" aria-label="Delete">
              <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
          </div>
        </div>
        ${past
          ? `<div class="past-label">This event has passed</div>`
          : `<div class="countdown">
              <div class="cd-block"><span class="cd-num" id="d-${ev.id}">${parts.d}</span><span class="cd-lbl">days</span></div>
              <span class="cd-sep">:</span>
              <div class="cd-block"><span class="cd-num" id="h-${ev.id}">${parts.h}</span><span class="cd-lbl">hrs</span></div>
              <span class="cd-sep">:</span>
              <div class="cd-block"><span class="cd-num" id="m-${ev.id}">${parts.m}</span><span class="cd-lbl">min</span></div>
              <span class="cd-sep">:</span>
              <div class="cd-block"><span class="cd-num" id="s-${ev.id}">${parts.s}</span><span class="cd-lbl">sec</span></div>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="p-${ev.id}" style="width:${pct.toFixed(2)}%"></div></div>`
        }
      </div>`;
    }

    function render() {
      const list = document.getElementById('list');
      const now = Date.now();
      if (!events.length) {
        list.innerHTML = `<div class="empty">
          <svg class="empty-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <rect x="6" y="10" width="36" height="32" rx="6"/>
            <line x1="16" y1="6" x2="16" y2="14"/><line x1="32" y1="6" x2="32" y2="14"/>
            <line x1="6" y1="22" x2="42" y2="22"/>
            <line x1="24" y1="30" x2="24" y2="38"/><line x1="20" y1="34" x2="28" y2="34"/>
          </svg>
          No countdowns yet.<br>Tap + to add your first event.</div>`;
        return;
      }
      list.innerHTML = events.map(ev => cardHtml(ev, now)).join('');
    }

    function tick() {
      const now = Date.now();
      let needsFull = false;
      events.forEach(ev => {
        const left = ev.dt - now;
        const parts = diffParts(left);
        if (!parts) { if (document.getElementById('s-'+ev.id)) needsFull = true; return; }
        const sEl = document.getElementById('s-'+ev.id);
        if (!sEl) { needsFull = true; return; }
        document.getElementById('d-'+ev.id).textContent = parts.d;
        document.getElementById('h-'+ev.id).textContent = parts.h;
        document.getElementById('m-'+ev.id).textContent = parts.m;
        sEl.textContent = parts.s;
        const total = ev.dt - ev.created;
        const pct = total > 0 ? Math.max(0, Math.min(100, (left/total)*100)) : 0;
        const pEl = document.getElementById('p-'+ev.id);
        if (pEl) pEl.style.width = pct.toFixed(2)+'%';
      });
      if (needsFull) render();
    }

    // ── Event delegation (buttons) ────────────────────────────────────────────

    document.getElementById('list').addEventListener('click', e => {
      const editBtn = e.target.closest('[data-edit]');
      const delBtn  = e.target.closest('[data-del]');
      if (editBtn) openModal(parseInt(editBtn.dataset.edit));
      if (delBtn)  removeEvent(parseInt(delBtn.dataset.del));
    });

    // ── Modal ─────────────────────────────────────────────────────────────────

    function openModal(id) {
      editingId = id;
      const isEdit = id !== null;
      document.getElementById('modalTitle').textContent   = isEdit ? 'Edit event' : 'New event';
      document.getElementById('modalSaveBtn').textContent = isEdit ? 'Save' : 'Add';
      if (isEdit) {
        const ev = events.find(e => e.id === id);
        document.getElementById('newLabel').value = ev.label;
        const d = new Date(ev.dt);
        d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
        document.getElementById('newDate').value = d.toISOString().slice(0,16);
      } else {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('newDate').value = now.toISOString().slice(0,16);
        document.getElementById('newLabel').value = '';
      }
      document.getElementById('modalOverlay').classList.remove('hidden');
      setTimeout(() => document.getElementById('newLabel').focus(), 80);
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.add('hidden');
      editingId = null;
    }

    function overlayClick(e) {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    }

    function saveModal() {
      const label = document.getElementById('newLabel').value.trim();
      const rawDate = document.getElementById('newDate').value;
      if (!label || !rawDate) return;
      const dt = new Date(rawDate).getTime();
      if (isNaN(dt)) return;
      if (editingId !== null) {
        const ev = events.find(e => e.id === editingId);
        if (ev) { ev.label = label; ev.dt = dt; }
      } else {
        events.push({ id: nextId++, label, dt, created: Date.now() });
      }
      saveEvents();
      closeModal();
      render();
    }

    function removeEvent(id) {
      events = events.filter(e => e.id !== id);
      saveEvents();
      render();
    }

    // ── Drag to reorder — touch-first, works on both mobile and desktop ───────

    let drag = {
      active: false,
      id: null,
      startY: 0,
      currentY: 0,
      ghost: null,
      ghostWidth: 0,
      ghostOffsetY: 0,
      placeholder: null,  // the dimmed original card
      targetIdx: null,
    };

    function getCardEls() {
      return Array.from(document.getElementById('list').querySelectorAll('.card[data-id]'));
    }

    function findTargetIdx(clientY) {
      const cards = getCardEls();
      for (let i = 0; i < cards.length; i++) {
        const r = cards[i].getBoundingClientRect();
        const mid = r.top + r.height / 2;
        if (clientY < mid) return i;
      }
      return cards.length - 1;
    }

    function startDrag(evId, clientY, clientX) {
      const card = document.getElementById('card-' + evId);
      if (!card) return;
      const rect = card.getBoundingClientRect();

      drag.active = true;
      drag.id = evId;
      drag.ghostOffsetY = clientY - rect.top;
      drag.ghostWidth = rect.width;

      // Show ghost
      const ev = events.find(e => e.id === evId);
      const ghost = document.getElementById('dragGhost');
      document.getElementById('ghostLabel').textContent = ev.label;
      document.getElementById('ghostDate').textContent  = fmtDate(ev.dt);
      ghost.style.display = 'block';
      ghost.style.width   = rect.width + 'px';
      ghost.style.left    = rect.left  + 'px';
      ghost.style.top     = (clientY - drag.ghostOffsetY) + 'px';
      drag.ghost = ghost;

      // Dim the original
      card.classList.add('drag-placeholder');

      drag.targetIdx = events.findIndex(e => e.id === evId);
    }

    function moveDrag(clientY) {
      if (!drag.active) return;
      drag.ghost.style.top = (clientY - drag.ghostOffsetY) + 'px';

      // Find insertion index based on pointer position
      const cards = getCardEls();
      let newIdx = cards.length - 1;
      for (let i = 0; i < cards.length; i++) {
        if (cards[i].dataset.id == drag.id) continue; // skip self
        const r = cards[i].getBoundingClientRect();
        if (clientY < r.top + r.height / 2) { newIdx = i; break; }
      }

      if (newIdx !== drag.targetIdx) {
        drag.targetIdx = newIdx;
        // Reorder events array in-place for live preview
        const fromIdx = events.findIndex(e => e.id === drag.id);
        // Clamp newIdx considering the removed element
        let toIdx = newIdx;
        if (fromIdx < toIdx) toIdx = Math.min(toIdx, events.length - 1);
        if (fromIdx !== toIdx) {
          const [moved] = events.splice(fromIdx, 1);
          events.splice(toIdx, 0, moved);
          render();
          // Restore placeholder styling after re-render
          const card = document.getElementById('card-' + drag.id);
          if (card) card.classList.add('drag-placeholder');
        }
      }
    }

    function endDrag() {
      if (!drag.active) return;
      drag.ghost.style.display = 'none';
      drag.active = false;
      const card = document.getElementById('card-' + drag.id);
      if (card) card.classList.remove('drag-placeholder');
      drag.id = null;
      saveEvents();
      render();
    }

    // Touch events — attached to list via delegation
    const list = document.getElementById('list');

    list.addEventListener('touchstart', e => {
      const handle = e.target.closest('[data-drag]');
      if (!handle) return;
      e.preventDefault();
      const id = parseInt(handle.dataset.drag);
      const t = e.touches[0];
      startDrag(id, t.clientY, t.clientX);
    }, { passive: false });

    list.addEventListener('touchmove', e => {
      if (!drag.active) return;
      e.preventDefault();
      moveDrag(e.touches[0].clientY);
    }, { passive: false });

    list.addEventListener('touchend', e => {
      if (!drag.active) return;
      e.preventDefault();
      endDrag();
    }, { passive: false });

    // Mouse events for desktop
    list.addEventListener('mousedown', e => {
      const handle = e.target.closest('[data-drag]');
      if (!handle) return;
      e.preventDefault();
      const id = parseInt(handle.dataset.drag);
      startDrag(id, e.clientY, e.clientX);
    });

    document.addEventListener('mousemove', e => {
      if (!drag.active) return;
      moveDrag(e.clientY);
    });

    document.addEventListener('mouseup', e => {
      if (!drag.active) return;
      endDrag();
    });

    render();
    setInterval(tick, 1000);
  </script>
</body>
</html>
